services:
  backend:
    build:
      context: .
      dockerfile: backend/Dockerfile
    environment:
      AERENDIL_RAFT_NODE_ID: node1
      AERENDIL_RAFT_BIND_ADDR: ":9100"
      AERENDIL_RAFT_DATA_DIR: /data
      AERENDIL_RAFT_BOOTSTRAP: "true"
      AERENDIL_JWT_SECRET: ${AERENDIL_JWT_SECRET:-aerendil-dev-secret}
      AERENDIL_ADMIN_USERNAME: ${AERENDIL_ADMIN_USERNAME:-admin}
      AERENDIL_ADMIN_PASSWORD: ${AERENDIL_ADMIN_PASSWORD:-admin123}
    volumes:
      - aerendil-raft-data:/data
    expose:
      - "8080"
      - "9000"

  ui:
    build:
      context: ./ui
      dockerfile: Dockerfile
    environment:
      AERENDIL_API_ORIGIN: http://backend:8080
    depends_on:
      - backend
    expose:
      - "3000"

  proxy:
    image: nginx:alpine
    volumes:
      - ./proxy/nginx.conf:/etc/nginx/nginx.conf:ro
    ports:
      - "8090:80"
    depends_on:
      - backend
      - ui

volumes:
  aerendil-raft-data:
