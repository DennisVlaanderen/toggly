services:
  backend:
    build:
      context: .
      dockerfile: backend/Dockerfile
    environment:
      TOGGLY_RAFT_NODE_ID: node1
      TOGGLY_RAFT_BIND_ADDR: ":9100"
      TOGGLY_RAFT_DATA_DIR: /data
      TOGGLY_RAFT_BOOTSTRAP: "true"
      TOGGLY_JWT_SECRET: ${TOGGLY_JWT_SECRET:-toggly-dev-secret}
    volumes:
      - toggly-raft-data:/data
    expose:
      - "8080"
      - "9000"

  ui:
    build:
      context: ./ui
      dockerfile: Dockerfile
    depends_on:
      - backend
    expose:
      - "3000"

  proxy:
    image: nginx:alpine
    volumes:
      - ./proxy/nginx.conf:/etc/nginx/nginx.conf:ro
    ports:
      - "8090:80"
    depends_on:
      - backend
      - ui

volumes:
  toggly-raft-data:
