# This workflow does a clean pnpm install, builds the SvelteKit app, and runs
# its vitest suite (including the browser-mode tests, which need a real
# Chromium instance installed via Playwright).
# For more information see: https://docs.github.com/en/actions/automating-builds-and-tests/building-and-testing-nodejs

name: Node.js CI

on:
  push:
    branches: [ "main" ]
    paths:
      - "ui/**"
      - ".github/workflows/node.js.yml"
  pull_request:
    branches: [ "main" ]
    paths:
      - "ui/**"
      - ".github/workflows/node.js.yml"

jobs:
  build:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ui

    steps:
    - uses: actions/checkout@v7

    - name: Install pnpm
      uses: pnpm/action-setup@v6
      with:
        package_json_file: ui/package.json

    - name: Use Node.js
      uses: actions/setup-node@v7
      with:
        node-version: 22.x
        cache: 'pnpm'
        cache-dependency-path: ui/pnpm-lock.yaml

    - name: Install dependencies
      run: pnpm install --frozen-lockfile

    - name: Install Playwright's Chromium
      run: pnpm exec playwright install --with-deps chromium

    - name: Build
      run: pnpm run build --if-present

    - name: Test
      run: pnpm test
